extractor: hf
mode: inference

hf:
  # Data
  inference_data_path: data/Annotations/Dev/json_format/dev.json
  inference_output_path: runs/relationExtractor/hf_biolinkbert_dev_predictions.json

  # Model
  model_path: checkpoints/relationExtractor/hf_biolinkbert_atlop_loss

  # Inference/runtime settings
  batch_size: 16
  max_length: 512
  seed: 42
  num_workers: 0
  use_amp: false

  # Relation extraction specific
  concatenate_title_abstract: true
