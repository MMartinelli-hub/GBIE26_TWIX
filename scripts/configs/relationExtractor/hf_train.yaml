extractor: hf
mode: train

hf:
  # Data
  train_data_paths:
    - data/Annotations/Train/platinum_quality/json_format/train_platinum.json
    - data/Annotations/Train/gold_quality/json_format/train_gold.json
    #- data/Annotations/Train/silver_quality/json_format/train_silver.json
  dev_data_path: data/Annotations/Dev/json_format/dev.json

  # Model
  model_name: michiyasunaga/BioLinkBERT-base
  output_dir: checkpoints/relationExtractor/hf_biolinkbert

  # Training hyper-parameters
  batch_size: 16
  num_epochs: 5
  learning_rate: 2.0e-5
  max_length: 512
  seed: 42
  num_workers: 0
  use_amp: false

  # Relation extraction specific
  negative_sample_multiplier: 1
  concatenate_title_abstract: true
