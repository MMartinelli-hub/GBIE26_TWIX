# run_entity_linker.py configuration for entity linking training on GBIE format
#
# Mode: Training a DUALENCODER retriever without reranker
#
# This config file uses the entity-linkings library and is adapted for GBIE format data.
# The 'linker' section contains parameters passed to ELEntityLinker.
#
# Usage:
#     python run_entity_linker.py --config scripts/configs/entityLinker/train_dualencoder.yaml

mode: train

linker:
  # Entity dictionary (JSONL format with concept definitions)
  entity_dict_path: "data/Concepts/uri_retrieved_definitions_el_format.jsonl"

  # Retriever selection (one of: bm25, prior, textembedding, e5bm25, dualencoder)
  retriever_id: dualencoder

  # Optional reranker (one of: crossencoder, chatel, fevry, extend, fusioned)
  # Set to null to run retrieval-only
  reranker_id: null

  # HuggingFace model for the retriever encoder
  retriever_model_name_or_path: "google-bert/bert-base-uncased"

  # Optional HuggingFace model for the reranker
  reranker_model_name_or_path: null

  # Optional YAML config files for retriever and reranker (from entity-linkings library)
  # These allow fine-tuning of the models' hyperparameters
  retriever_config: null
  reranker_config: null

  # Pre-built retriever index directory (optional, for inference with existing models)
  # When null, the index is built from scratch during training
  retriever_index_dir: null

  # Training data paths (GBIE JSON format, can specify multiple)
  train_data_paths:
    - "data/Annotations/Train/gold_quality/json_format/train_gold.json"
    - "data/Annotations/Train/platinum_quality/json_format/train_platinum.json"
    #- "data/Annotations/Train/silver_quality/json_format/train_silver.json"

  # Development set for validation (optional)
  dev_data_path: "data/Annotations/Dev/all_documents.json"

  # Output directory for checkpoints
  output_dir: "runs/entityLinker/dualencoder_train"

  # Training hyperparameters
  num_train_epochs: 5
  train_batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 1

  # Retriever training: number of hard negatives to mine per positive span
  num_hard_negatives: 0

  # Retriever/reranker inference: top-k candidates to retrieve or rerank
  num_candidates: 30

  # Remove NIL (non-linkable) entities from training/evaluation
  remove_nil: false

  # HuggingFace datasets cache directory (optional)
  cache_dir: null

  # Random seed for reproducibility
  seed: 42
