# run_entity_linker.py configuration for training a reranker on GBIE format
#
# Mode: Training a reranker on top of a pre-trained retriever
#
# This config assumes you have already trained a retriever using train_retriever.yaml.
# It will train a reranker (e.g., CROSSENCODER) using candidates from the retriever.
#
# Usage:
#     python run_entity_linker.py --config scripts/configs/entityLinker/train_reranker.yaml

mode: train

linker:
  # Entity dictionary (JSONL format with concept definitions)
  entity_dict_path: "data/Concepts/uri_retrieved_definitions_el_format.jsonl"

  # Retriever selection (pre-trained retriever to use for candidate generation)
  retriever_id: textembedding

  # Reranker to train (one of: crossencoder, chatel, fevry, extend, fusioned)
  reranker_id: crossencoder

  # Pre-trained retriever checkpoint (from train_retriever.yaml output)
  retriever_model_name_or_path: "runs/entityLinker/retriever_checkpoint_retriever=textembedding_retriever_model=michiyasunaga__BioLinkBERT-base"

  # HuggingFace model for the reranker encoder (will be fine-tuned)
  reranker_model_name_or_path: "michiyasunaga/BioLinkBERT-base"

  # Optional YAML config files for retriever and reranker (from entity-linkings library)
  retriever_config: null
  reranker_config: null

  # Pre-built retriever index directory (optional, speeds up reranker training)
  retriever_index_dir: "runs/entityLinker/retriever_checkpoint_retriever=textembedding_retriever_model=michiyasunaga__BioLinkBERT-base"

  # Training data paths (GBIE JSON format, can specify multiple)
  train_data_paths:
    - "data/Annotations/Train/gold_quality/json_format/train_gold.json"
    - "data/Annotations/Train/platinum_quality/json_format/train_platinum.json"
    #- "data/Annotations/Train/silver_quality/json_format/train_silver.json"

  # Development set for validation (optional)
  dev_data_path: "data/Annotations/Dev/json_format/dev.json"

  # Output directory for reranker checkpoint
  output_dir: "runs/entityLinker/retriever_reranker_checkpoint"

  # Training hyperparameters
  num_train_epochs: 4
  train_batch_size: 8
  eval_batch_size: 16
  gradient_accumulation_steps: 2

  # Hard negatives (only used for retriever training, not used here)
  num_hard_negatives: 0

  # Number of candidates for reranker to rerank (should be larger than final output)
  num_candidates: 20

  # Remove NIL (non-linkable) entities from training/evaluation
  remove_nil: false

  # HuggingFace datasets cache directory (optional)
  cache_dir: null

  # Random seed for reproducibility
  seed: 42

  candidate_retrieval_batch_size: 32
  train_retriever: false
  train_reranker: true
