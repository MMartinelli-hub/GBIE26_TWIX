# run_entity_linker.py configuration for training a retriever on GBIE format
#
# Mode: Training a retriever (TEXTEMBEDDING) from scratch
#
# This config trains just the retriever without any reranker.
# After training completes, use train_reranker.yaml to train a reranker on top.
#
# Usage:
#     python run_entity_linker.py --config scripts/configs/entityLinker/train_retriever.yaml

mode: train

linker:
  # Entity dictionary (JSONL format with concept definitions)
  entity_dict_path: "data/Concepts/uri_retrieved_definitions_el_format.jsonl"

  # Retriever selection (one of: bm25, prior, textembedding, e5bm25, dualencoder)
  retriever_id: textembedding

  # No reranker during retriever training
  reranker_id: null

  # HuggingFace model for the retriever encoder
  retriever_model_name_or_path: "michiyasunaga/BioLinkBERT-base"

  # Optional HuggingFace model for the reranker (not used in this config)
  reranker_model_name_or_path: null

  # Optional YAML config files for retriever and reranker (from entity-linkings library)
  retriever_config: null
  reranker_config: null

  # Pre-built retriever index directory (optional, for inference with existing models)
  retriever_index_dir: null

  # Training data paths (GBIE JSON format, can specify multiple)
  train_data_paths:
    - "data/Annotations/Train/gold_quality/json_format/train_gold.json"
    - "data/Annotations/Train/platinum_quality/json_format/train_platinum.json"
    #- "data/Annotations/Train/silver_quality/json_format/train_silver.json"

  # Development set for validation (optional)
  dev_data_path: "data/Annotations/Dev/json_format/dev.json"

  # Output directory for retriever checkpoint
  output_dir: "runs/entityLinker/retriever_checkpoint"

  # Training hyperparameters
  num_train_epochs: 5
  train_batch_size: 16
  eval_batch_size: 32
  gradient_accumulation_steps: 1

  # Retriever training: number of hard negatives to mine per positive span
  num_hard_negatives: 0

  # Number of candidates (not used during retriever training, but set for consistency)
  num_candidates: 30

  # Remove NIL (non-linkable) entities from training/evaluation
  remove_nil: false

  # HuggingFace datasets cache directory (optional)
  cache_dir: null

  # Random seed for reproducibility
  seed: 42

  #candidate_retrieval_batch_size: 1
  train_retriever: true
  train_reranker: false
