  # Provider credentials / endpoints
  api_key: null
  base_url: null
  azure_endpoint: null
  azure_api_version: "2024-02-01"

  # Data
  inference_data_path: data/Annotations/Dev/json_format/dev.json
  inference_output_path: runs/termClassifier/llm_medgemma-4b-it-mlx_dev_predictions.json
